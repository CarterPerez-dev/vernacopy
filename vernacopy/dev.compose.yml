# =============================================================================
# AngelaMos | 2026
# dev.compose.yml
# =============================================================================
# Development compose - Nginx + Vite + VernaCopy Backend + PostgreSQL + Redis
# Uses .env.development (different ports than production)
# =============================================================================

name: ${APP_NAME:-vernacopy}-dev

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${APP_NAME:-vernacopy}-nginx-dev
    ports:
      - "${NGINX_HOST_PORT:-18293}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/dev.nginx:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/vite.dev
    container_name: ${APP_NAME:-vernacopy}-frontend-dev
    ports:
      - "${FRONTEND_HOST_PORT:-56842}:5173"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-/api}
      - VITE_APP_TITLE=${VITE_APP_TITLE:-VernaCopy}
    networks:
      - frontend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/fastapi.dev
    container_name: ${APP_NAME:-vernacopy}-backend-dev
    ports:
      - "${BACKEND_HOST_PORT:-39471}:8000"
    volumes:
      - ./backend:/app
      - backend_cache:/app/.venv
      - backend_wordnet:/root/.wn_data
    env_file:
      - .env.development
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - RELOAD=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ${APP_NAME:-vernacopy}-ollama-dev
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg17
    container_name: ${APP_NAME:-vernacopy}-db-dev
    ports:
      - "${POSTGRES_HOST_PORT:-27365}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-app_db}
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME:-vernacopy}-redis-dev
    ports:
      - "${REDIS_HOST_PORT:-44918}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  postgres_data:
    name: vernacopy_postgres
    external: true
  redis_data:
    name: vernacopy_redis
  backend_cache:
  backend_wordnet:
  frontend_modules:
  ollama_data:
    name: vernacopy_ollama
    external: true
